# pg-chaos.conf — Postgres config for the Postgres-tier chaos kill/resume campaign (issue #52).
# Included from postgresql.conf (see pg-ctl-chaos.sh, which appends the include once).
# CRITICAL: this is the crash-DURABLE substrate the whole tier exists for — do NOT weaken any
# durability setting. fsync/synchronous_commit/full_page_writes stay ON.
#
# unix_socket_directories below carries a placeholder token so the committed file holds no absolute
# path; pg-ctl-chaos.sh substitutes it from $CHAOS_PGSOCK to a writable socket dir when it wires the
# include into postgresql.conf.

listen_addresses = '127.0.0.1'          # loopback only — never externally reachable
port = 54329                            # dedicated port; pick one verified-free on the host
unix_socket_directories = '@CHAOS_PGSOCK@'  # substituted at deploy time (user-writable socket dir)

# ── durability (the point of this tier — issue #52) ───────────────────────────────────────────────
fsync = on                              # crash-durable (PGlite ran with fsync OFF → torn WAL)
synchronous_commit = on                 # commits durable before ack
full_page_writes = on                   # torn-page protection on crash recovery
wal_level = replica                     # default; adequate for crash recovery

# ── modest memory (single-user chaos loop; footprint budget) ──────────────────────────────────────
shared_buffers = 512MB
work_mem = 32MB
maintenance_work_mem = 128MB
max_connections = 40                    # ponder pool max=30 + psql probes + headroom

# ── logging → the campaign log (a single durable log for the whole campaign) ──────────────────────
logging_collector = off                 # pg_ctl -l captures stderr to the log file directly
log_line_prefix = '%m [%p] '
log_min_messages = warning
log_checkpoints = on                    # so crash-recovery / checkpoint events are visible as evidence
