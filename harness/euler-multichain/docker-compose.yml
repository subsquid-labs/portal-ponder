# Postgres for the flagship 15-chain Euler e2e — the PRODUCTION database shape (separate process,
# its own memory, real WAL/checkpoint behaviour). Bring it up, then ./run.sh:
#
#   docker compose up -d postgres
#   cp .env.example .env   # fill in SQD_RPC_KEY + PORTAL_API_KEY
#   ./run.sh
#
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: pw
      POSTGRES_DB: euler
      POSTGRES_HOST_AUTH_METHOD: trust
    ports: ["5433:5432"]
    shm_size: 1gb   # headroom for parallel multichain inserts / sorts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d euler"]
      interval: 2s
      timeout: 3s
      retries: 40
